      .label-lg { font: 700 25px "Microsoft JhengHei", "Noto Sans TC", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
      .label-md { font: 700 21px "Microsoft JhengHei", "Noto Sans TC", sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
